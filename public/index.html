<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="login-screen" id="loginScreen">
    <div class="glass-card">
        <h1>CIPHERCHAT</h1>
        <p>Secure End-to-End Messaging</p>

        <input id="username" placeholder="Username">
        <input id="email" placeholder="Email (signup only)">
        <input id="password" type="password" placeholder="Password">

        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="chat-screen hidden" id="chatScreen">
    <div class="chat-wrapper">

        <div class="topbar">
            <div>
                <h2>CipherChat Secure Link</h2>
                <p id="presence">Connecting...</p>
            </div>

            <div>
                <button onclick="setPasskey()">Passkey</button>
                <button onclick="logout()">Logout</button>
                <button class="panic-btn" onclick="panic()">PANIC</button>
            </div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="chat-controls">
            <input id="recipient" placeholder="Send to username">
            <input id="timer" type="number" placeholder="Destruct (sec)">
            <textarea id="message" placeholder="Transmit secure message..."></textarea>
            <button onclick="send()">SEND</button>
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="crypto.js"></script>
<script src="app.js"></script>

</body>
</html>
